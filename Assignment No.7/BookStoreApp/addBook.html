<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
        }

        .form-container {
            margin-top: 60px;
        }

        form {
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #2c3e50;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        input[type="submit"] {
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #27ae60;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="header">
    📚 Bookstore Management System
</div>

<div class="form-container">
    <form action="BookServlet" method="post">
        <h2>➕ Add New Book</h2>

        <input type="hidden" name="action" value="add">

        <input type="text" name="title" placeholder="Enter Title" required><br>

        <input type="text" name="author" placeholder="Enter Author" required><br>

        <input type="number" step="0.01" name="price" placeholder="Enter Price" required><br>

        <input type="number" name="qty" placeholder="Enter Quantity" required><br>

        <input type="submit" value="Add Book">
    </form>

    <a href="BookServlet" class="back">⬅ Back to Book List</a>
</div>

</body>
</html>
